<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Productos App</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div id="app">

      <div id="mensaje"></div>

      <!-- LOGIN / REGISTER -->
      <div id="auth-section">
        <h2>Iniciar sesión</h2>
        <form id="login-form">
          <input type="email" id="login-email" placeholder="Email" required />
          <input type="password" id="login-password" placeholder="Contraseña" required />
          <button type="submit">Iniciar sesión</button>
        </form>

        <h2>Registrarse</h2>
        <form id="register-form">
          <input type="email" id="register-email" placeholder="Email" required />
          <input type="password" id="register-password" placeholder="Contraseña (mín. 6 caracteres)" required />
          <button type="submit">Registrarse</button>
        </form>
      </div>

      <!-- SECCIÓN PRINCIPAL (logueado) -->
      <div id="main-section" style="display:none;">

        <!-- Barra superior -->
        <div id="user-info">
          <span>
            <strong id="user-email"></strong>
            <span id="role-badge" class="role-badge"></span>
          </span>
          <button id="btn-logout">Cerrar sesión</button>
        </div>

        <!-- Tabs -->
        <div class="tabs">
          <button class="tab-btn active" data-tab="tab-productos">Productos</button>
          <button class="tab-btn" data-tab="tab-carrito" id="tab-btn-carrito" style="display:none;">🛒 Mi Carrito</button>
          <button class="tab-btn" data-tab="tab-usuarios" id="tab-btn-usuarios" style="display:none;">Usuarios</button>
        </div>

        <!-- TAB: PRODUCTOS -->
        <div id="tab-productos" class="tab-content active">

          <!-- Formulario solo para admin/superadmin -->
          <div id="admin-product-form-section" style="display:none;">
            <h3>Agregar / Editar producto</h3>
            <form id="product-form">
              <input type="text" id="product-name" placeholder="Nombre del producto" />
              <input type="number" id="product-price" placeholder="Precio" />
              <input type="number" id="product-stock" placeholder="Stock" />
              <select id="product-category">
                <option value="">Seleccioná una categoría</option>
              </select>
              <input type="hidden" id="editing-id" value="" />
              <button type="submit" id="btn-product">Agregar Producto</button>
            </form>
          </div>

          <table>
            <thead>
              <tr>
                <th>Producto</th>
                <th>Categoría</th>
                <th>Precio</th>
                <th>Stock</th>
                <th>Acciones</th>
              </tr>
            </thead>
            <tbody id="tabla-productos"></tbody>
          </table>
        </div>

        <!-- TAB: CARRITO (solo user) -->
        <div id="tab-carrito" class="tab-content">
          <h3 style="margin-bottom:14px;">Mi Carrito</h3>
          <div id="carrito-lista"></div>
          <div id="carrito-total"></div>
          <button id="btn-checkout">Confirmar compra</button>
        </div>

        <!-- TAB: USUARIOS (solo superadmin) -->
        <div id="tab-usuarios" class="tab-content">
          <h3 style="margin-bottom:14px;">Gestión de Usuarios</h3>
          <table>
            <thead>
              <tr>
                <th>ID</th>
                <th>Email</th>
                <th>Rol actual</th>
                <th>Cambiar rol</th>
              </tr>
            </thead>
            <tbody id="tabla-usuarios"></tbody>
          </table>
        </div>

      </div>
    </div>

    <script type="module" src="main.js"></script>
  </body>
</html>
